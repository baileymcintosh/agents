name: Research Session (Multi-Cycle)

# Runs multiple planâ†’buildâ†’verify cycles within a time budget,
# then delivers a final reporter summary at the end.
# This is the workflow to use for "run for 2 hours and give me the full report."

on:
  workflow_dispatch:
    inputs:
      time_budget:
        description: "Total time budget e.g. 2h, 20h, 30m (required)"
        required: true
        default: "2h"
        type: string
      model_tier:
        description: "Model tier: sonnet = ~$1-3 per 2h session | opus = ~$7-10 per 2h session (world-class depth)"
        required: false
        default: "sonnet"
        type: choice
        options: ["sonnet", "opus"]
      dry_run:
        description: "Dry run (no Claude calls)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_EXECUTIVE_CHANNEL_ID: ${{ secrets.SLACK_EXECUTIVE_CHANNEL_ID }}
  TIME_BUDGET: ${{ github.event.inputs.time_budget }}
  GITHUB_REPOSITORY: ${{ github.repository }}
  # Model tier â€” sonnet saves ~5x vs opus with minimal quality loss for research tasks
  PLANNER_MODEL: ${{ github.event.inputs.model_tier == 'opus' && 'claude-opus-4-6' || 'claude-sonnet-4-6' }}
  BUILDER_MODEL: ${{ github.event.inputs.model_tier == 'opus' && 'claude-opus-4-6' || 'claude-sonnet-4-6' }}
  VERIFIER_MODEL: "claude-sonnet-4-6"
  REPORTER_MODEL: "claude-sonnet-4-6"

jobs:
  session:
    name: "Research Session (${{ github.event.inputs.time_budget }})"
    runs-on: ubuntu-latest
    # Set a hard GitHub Actions timeout slightly above the budget (convert to minutes + buffer)
    # Default 6h covers any reasonable budget
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with: { ref: main }

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync

      - name: Install pandoc + LaTeX for PDF generation
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-latex-extra \
            texlive-fonts-recommended fonts-dejavu

      - name: Configure git
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"

      - name: Post session start to Slack
        run: |
          python - <<'PYEOF'
          import os, json
          import urllib.request
          token = os.environ.get("SLACK_BOT_TOKEN", "")
          channel = os.environ.get("SLACK_EXECUTIVE_CHANNEL_ID", "")
          budget = os.environ.get("TIME_BUDGET", "")
          if not token or not channel:
              print("Slack not configured, skipping")
              exit(0)
          tier = os.environ.get("PLANNER_MODEL", "")
          model_label = "Opus (premium)" if "opus" in tier else "Sonnet (standard)"
          cost_est = "~$7â€“10" if "opus" in tier else "~$1â€“3"
          msg = f":rocket: *Research Session started* â€” budget: *{budget}* | model: *{model_label}* | est. cost: *{cost_est}*\nRunning multiple research cycles until time is up. You'll receive a full report when done."
          data = json.dumps({"channel": channel, "text": msg}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=data,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)
          PYEOF

      - name: Run research session loop
        run: |
          FLAG=$([[ "${{ github.event.inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")

          # Parse budget into seconds
          BUDGET_STR="${{ github.event.inputs.time_budget }}"
          if [[ "$BUDGET_STR" == *h ]]; then
            BUDGET_MIN=$(echo "$BUDGET_STR" | sed 's/h//' | awk '{printf "%.0f", $1 * 60}')
          elif [[ "$BUDGET_STR" == *m ]]; then
            BUDGET_MIN=$(echo "$BUDGET_STR" | sed 's/m//')
          else
            BUDGET_MIN=$BUDGET_STR
          fi
          BUDGET_SEC=$((BUDGET_MIN * 60))
          # Reserve 5 min for final reporter + push
          REPORTER_RESERVE_SEC=300

          START=$(date +%s)
          CYCLE=0

          echo "Session budget: ${BUDGET_MIN} min (${BUDGET_SEC}s)"

          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            REMAINING=$(( BUDGET_SEC - ELAPSED - REPORTER_RESERVE_SEC ))
            CYCLE=$((CYCLE + 1))

            echo ""
            echo "=== CYCLE ${CYCLE} | Elapsed: $((ELAPSED/60))m | Remaining (excl. reporter reserve): $((REMAINING/60))m ==="

            # Stop if less than 4 minutes left for a research cycle
            if [ $REMAINING -lt 240 ]; then
              echo "Not enough time for another full cycle â€” moving to final report."
              break
            fi

            # Run planner
            echo "--- Planner ---"
            uv run agentorg run planner $FLAG || echo "Planner encountered an error but continuing"

            # Check if planner marked project complete
            LATEST_PLAN=$(ls -t reports/*_planner_*.md 2>/dev/null | head -1)
            if [ -n "$LATEST_PLAN" ] && grep -q "PROJECT STATUS: COMPLETE\|ALL SECTIONS COMPLETE\|project is complete" "$LATEST_PLAN" 2>/dev/null; then
              echo "Planner marked project complete â€” moving to final report."
              break
            fi

            # Run builder
            echo "--- Builder ---"
            uv run agentorg run builder $FLAG || echo "Builder encountered an error but continuing"

            # Run verifier
            echo "--- Verifier ---"
            uv run agentorg run verifier $FLAG || echo "Verifier encountered an error but continuing"

            # Push this cycle's reports
            git add reports/
            git diff --staged --quiet || git commit -m "session: cycle ${CYCLE} complete $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push

            # Brief pause between cycles
            sleep 5
          done

          echo ""
          echo "=== FINAL REPORTER ==="
          uv run agentorg run reporter $FLAG || echo "Reporter encountered an error"

      - name: Push final reports
        run: |
          git add reports/
          git diff --staged --quiet || git commit -m "session: final report $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

  # Debugger fires if the session job crashes completely
  debug:
    name: "đź”§ Debugger"
    needs: [session]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Run Debugger
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run agentorg run debugger
      - name: Push debug report
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "debug: session failure $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
