name: Research Session (Multi-Cycle)

# Runs multiple plan → collaborative-session (qual+quant in parallel) → verify cycles
# within a time budget, then delivers a final reporter summary at the end.

on:
  workflow_dispatch:
    inputs:
      time_budget:
        description: "Total time budget e.g. 2h, 20h, 30m (required)"
        required: true
        default: "2h"
        type: string
      model_tier:
        description: "Claude tier: sonnet = ~$1-3 per 2h | opus = ~$7-10 per 2h (world-class depth)"
        required: false
        default: "sonnet"
        type: choice
        options: ["sonnet", "opus"]
      collab_turns:
        description: "Cross-check turns per agent per cycle (3 = thorough, 2 = faster)"
        required: false
        default: "3"
        type: choice
        options: ["2", "3", "4", "5"]
      dry_run:
        description: "Dry run (no API calls)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  TIME_BUDGET: ${{ github.event.inputs.time_budget }}
  SESSION_COLLAB_TURNS: ${{ github.event.inputs.collab_turns }}
  GITHUB_REPOSITORY: ${{ github.repository }}
  PLANNER_MODEL: ${{ github.event.inputs.model_tier == 'opus' && 'claude-opus-4-6' || 'claude-sonnet-4-6' }}
  QUANT_BUILDER_MODEL: ${{ github.event.inputs.model_tier == 'opus' && 'claude-opus-4-6' || 'claude-sonnet-4-6' }}
  QUAL_BUILDER_MODEL: "gpt-4o"
  VERIFIER_MODEL: "claude-sonnet-4-6"
  REPORTER_MODEL: "claude-sonnet-4-6"

jobs:
  session:
    name: "Research Session (${{ github.event.inputs.time_budget }}, ${{ github.event.inputs.collab_turns }} turns)"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with: { ref: main }

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync

      - name: Install pandoc + LaTeX for PDF generation
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-latex-extra \
            texlive-fonts-recommended fonts-dejavu

      - name: Configure git
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"

      - name: Run research session loop
        run: |
          FLAG=$([[ "${{ github.event.inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")

          # Parse budget into seconds
          BUDGET_STR="${{ github.event.inputs.time_budget }}"
          if [[ "$BUDGET_STR" == *h ]]; then
            BUDGET_MIN=$(echo "$BUDGET_STR" | sed 's/h//' | awk '{printf "%.0f", $1 * 60}')
          elif [[ "$BUDGET_STR" == *m ]]; then
            BUDGET_MIN=$(echo "$BUDGET_STR" | sed 's/m//')
          else
            BUDGET_MIN=$BUDGET_STR
          fi
          BUDGET_SEC=$((BUDGET_MIN * 60))
          # Reserve 8 min for final reporter + push (reporter is heavier now)
          REPORTER_RESERVE_SEC=480

          START=$(date +%s)
          CYCLE=0

          echo "Session budget: ${BUDGET_MIN} min (${BUDGET_SEC}s)"
          echo "Collaborative turns per agent: ${{ github.event.inputs.collab_turns }}"

          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            REMAINING=$(( BUDGET_SEC - ELAPSED - REPORTER_RESERVE_SEC ))
            CYCLE=$((CYCLE + 1))

            echo ""
            echo "=== CYCLE ${CYCLE} | Elapsed: $((ELAPSED/60))m | Remaining: $((REMAINING/60))m ==="

            if [ $REMAINING -lt 300 ]; then
              echo "Not enough time for another full cycle — moving to final report."
              break
            fi

            # 1. Planner sets the research agenda
            echo "--- Planner ---"
            uv run agentorg run planner $FLAG || echo "Planner error — continuing"

            # Check if planner marked project complete
            LATEST_PLAN=$(ls -t reports/*_planner_*.md 2>/dev/null | head -1)
            if [ -n "$LATEST_PLAN" ] && grep -q "PROJECT STATUS: COMPLETE\|ALL SECTIONS COMPLETE" "$LATEST_PLAN" 2>/dev/null; then
              echo "Planner marked project complete — moving to final report."
              break
            fi

            # 2. Collaborative session: qual (OpenAI) + quant (Claude) run in parallel
            echo "--- Collaborative Session (qual + quant, ${{ github.event.inputs.collab_turns }} turns each) ---"
            uv run agentorg session --time-budget "${BUDGET_STR}" $FLAG || echo "Session error — continuing"

            # 3. Verifier checks both outputs
            echo "--- Verifier ---"
            uv run agentorg run verifier $FLAG || echo "Verifier error — continuing"

            # Push this cycle
            git add reports/
            git diff --staged --quiet || git commit -m "session: cycle ${CYCLE} complete $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push

            sleep 5
          done

          # Final reporter is already run inside `agentorg session` — but run standalone
          # here too in case the session ran planner-only and there's no session report yet.
          echo ""
          echo "=== FINAL REPORTER ==="
          uv run agentorg run reporter $FLAG || echo "Reporter error"

      - name: Push final reports
        run: |
          git add reports/
          git diff --staged --quiet || git commit -m "session: final report $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

  debug:
    name: "🔧 Debugger"
    needs: [session]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Run Debugger
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run agentorg run debugger
      - name: Push debug report
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "debug: session failure $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
