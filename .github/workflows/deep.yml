name: Deep Run

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project name (must match existing repo baileymcintosh/<project_name>)"
        required: true
        type: string
      team:
        description: "Comma-separated agent roles"
        required: true
        type: string
      feedback:
        description: "Feedback from preliminary run (optional)"
        required: false
        type: string
      model_tier:
        description: "sonnet = cheaper | opus = best quality"
        required: false
        default: "sonnet"
        type: choice
        options: ["sonnet", "opus"]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  QUAL_BUILDER_MODEL: "gpt-4o"
  QUANT_BUILDER_MODEL: "claude-sonnet-4-6"
  REPORTER_MODEL: ${{ github.event.inputs.model_tier == 'opus' && 'claude-opus-4-6' || 'claude-sonnet-4-6' }}

jobs:
  deep:
    name: "Deep: ${{ github.event.inputs.project_name }} (${{ github.event.inputs.model_tier }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout agents repo
        uses: actions/checkout@v4
        with: { ref: main }

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync

      - name: Install pandoc + LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pandoc texlive-xetex texlive-fonts-recommended fonts-dejavu

      - name: Clone project repo
        run: |
          gh repo clone "baileymcintosh/${{ github.event.inputs.project_name }}" /tmp/project
          cd /tmp/project
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          mkdir -p reports notebooks data

      - name: Write feedback
        if: ${{ github.event.inputs.feedback != '' }}
        run: echo "${{ github.event.inputs.feedback }}" > /tmp/project/FEEDBACK.md

      - name: Run deep agents (parallel where possible)
        env:
          REPORTS_DIR: /tmp/project/reports
        run: |
          TEAM="${{ github.event.inputs.team }}"

          # Run qual + quant in parallel, everything else sequential after
          PIDS=()
          for role in qual_builder quant_builder researcher data_analyst coder; do
            if echo "$TEAM" | grep -q "$role"; then
              echo "=== $role (parallel) ==="
              uv run agentorg run "$role" &
              PIDS+=($!)
            fi
          done
          for pid in "${PIDS[@]}"; do wait "$pid" || true; done

          for role in verifier reporter; do
            if echo "$TEAM" | grep -q "$role"; then
              echo "=== $role ==="
              uv run agentorg run "$role" || echo "$role error"
            fi
          done

      - name: Push outputs to project repo
        run: |
          cd /tmp/project
          git add .
          git diff --staged --quiet || git commit -m "deep: research outputs (${{ github.event.inputs.model_tier }})"
          git pull --rebase origin main
          git push
          echo "Results: https://github.com/baileymcintosh/${{ github.event.inputs.project_name }}"
