name: Deep Run

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project repo name (must exist at github.com/baileymcintosh/<name>)"
        required: true
        type: string
      feedback:
        description: "Feedback from prelim run to incorporate (optional)"
        required: false
        type: string

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  AGENTORG_PROJECTS_ROOT: /tmp/projects
  AGENTORG_CREATE_GITHUB_REPO: "false"

jobs:
  deep:
    name: "Deep: ${{ github.event.inputs.project_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout agents repo
        uses: actions/checkout@v4
        with: { ref: main }

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync

      - name: Install pandoc + LaTeX (for PDF export)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pandoc texlive-xetex texlive-fonts-recommended fonts-dejavu

      - name: Clone project repo
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
        run: |
          mkdir -p /tmp/projects
          git clone "https://x-access-token:${PAT_TOKEN}@github.com/baileymcintosh/${PROJECT_NAME}.git" /tmp/projects/${PROJECT_NAME}
          cd /tmp/projects/${PROJECT_NAME}
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/baileymcintosh/${PROJECT_NAME}.git"
          mkdir -p reports data notebooks

      - name: Write feedback file (if provided)
        if: ${{ github.event.inputs.feedback != '' }}
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          FEEDBACK: ${{ github.event.inputs.feedback }}
        run: echo "$FEEDBACK" > /tmp/projects/${PROJECT_NAME}/FEEDBACK.md

      - name: Bootstrap session state
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
        run: |
          python3 - <<'PYEOF'
          import json, datetime, os
          from pathlib import Path
          project_name = os.environ["PROJECT_NAME"]
          project_dir = Path(f"/tmp/projects/{project_name}")
          # Read brief from the cloned project repo
          brief_path = project_dir / "BRIEF.md"
          brief = brief_path.read_text().strip() if brief_path.exists() else ""
          session = {
              "name": project_name,
              "brief": brief,
              "project_dir": str(project_dir),
              "github_repo": f"baileymcintosh/{project_name}",
              "github_url": f"https://github.com/baileymcintosh/{project_name}",
              "phase": "prelim",
              "team": ["qual_builder", "quant_builder"],
              "completed_phases": ["prelim"],
              "last_run": datetime.datetime.now().isoformat(),
              "last_outputs": [],
              "pending_feedback": "",
              "notes": "",
              "publication_approval_required": False,
              "publication_approval_status": "",
              "publication_approval_run_id": "",
              "publication_approval_path": "",
              "publication_approval_updated_at": "",
          }
          Path("SESSION.json").write_text(json.dumps(session, indent=2))
          print(f"Session bootstrapped: {project_name} (brief: {brief[:80]}...)")
          PYEOF

      - name: Run deep pipeline
        # Full canonical path: collaborative qual+quant session → critic checkpoint →
        # verifier → reporter → qa_editor → publication approval
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          FEEDBACK: ${{ github.event.inputs.feedback }}
        run: |
          RUN_DIR="/tmp/projects/${PROJECT_NAME}/runs/deep_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$RUN_DIR"
          REPORTS_DIR="$RUN_DIR" uv run agentorg iterate "$FEEDBACK"

      - name: Summary
        if: always()
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
        run: echo "Results at https://github.com/baileymcintosh/${PROJECT_NAME}"
