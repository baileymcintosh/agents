name: Deep Run

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Topic slug OR existing repo name to continue (e.g. iran-us-economy-2026-run5)"
        required: true
        type: string
      feedback:
        description: "Feedback from prelim run to incorporate (optional)"
        required: false
        type: string
      repo_name:
        description: "Override repo name (optional — if omitted, auto-appends run number to project_name)"
        required: false
        type: string
      deep_quant_model:
        description: "Quant builder model (default: claude-haiku-4-5-20251001)"
        required: false
        type: string
      deep_qual_model:
        description: "Qual builder model (default: gpt-4o-mini)"
        required: false
        type: string
      deep_reporter_model:
        description: "Reporter model (default: claude-sonnet-4-6)"
        required: false
        type: string

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  AGENTORG_PROJECTS_ROOT: /tmp/projects
  AGENTORG_CREATE_GITHUB_REPO: "false"
  DEEP_QUANT_MODEL: ${{ github.event.inputs.deep_quant_model || 'claude-haiku-4-5-20251001' }}
  DEEP_QUAL_MODEL: ${{ github.event.inputs.deep_qual_model || 'gpt-4o-mini' }}
  DEEP_REPORTER_MODEL: ${{ github.event.inputs.deep_reporter_model || 'claude-sonnet-4-6' }}

jobs:
  deep:
    name: "Deep: ${{ github.event.inputs.project_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout agents repo
        uses: actions/checkout@v4
        with: { ref: main }

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync

      - name: Install pandoc + LaTeX (for PDF export)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pandoc texlive-xetex texlive-fonts-recommended fonts-dejavu

      - name: Resolve repo name
        id: repo
        env:
          TOPIC: ${{ github.event.inputs.project_name }}
          OVERRIDE: ${{ github.event.inputs.repo_name }}
          RUN_NUM: ${{ github.run_number }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            REPO_NAME="$OVERRIDE"
          else
            REPO_NAME="${TOPIC}-run${RUN_NUM}"
          fi
          echo "REPO_NAME=$REPO_NAME" >> "$GITHUB_ENV"
          echo "repo_name=$REPO_NAME" >> "$GITHUB_OUTPUT"
          echo "Repo: $REPO_NAME"

      - name: Create or clone project repo
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p /tmp/projects
          if git clone "https://x-access-token:${PAT_TOKEN}@github.com/baileymcintosh/${REPO_NAME}.git" /tmp/projects/${REPO_NAME} 2>/dev/null; then
            echo "Cloned existing repo"
          else
            echo "Creating new repo via GitHub API"
            curl -s -X POST \
              -H "Authorization: token ${PAT_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/user/repos \
              -d "{\"name\":\"${REPO_NAME}\",\"private\":false,\"auto_init\":false}" \
              | grep -E '"full_name"|"html_url"' | head -2
            sleep 3
            git clone "https://x-access-token:${PAT_TOKEN}@github.com/baileymcintosh/${REPO_NAME}.git" /tmp/projects/${REPO_NAME}
          fi
          cd /tmp/projects/${REPO_NAME}
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/baileymcintosh/${REPO_NAME}.git"
          mkdir -p reports data notebooks
          git checkout -b main 2>/dev/null || git checkout main
          git add . && git diff --staged --quiet || git commit -m "init: project setup"
          git push --set-upstream origin main 2>/dev/null || true

      - name: Write feedback file (if provided)
        if: ${{ github.event.inputs.feedback != '' }}
        env:
          FEEDBACK: ${{ github.event.inputs.feedback }}
        run: echo "$FEEDBACK" > /tmp/projects/${REPO_NAME}/FEEDBACK.md

      - name: Bootstrap session state
        run: |
          python3 - <<'PYEOF'
          import json, datetime, os
          from pathlib import Path
          repo_name = os.environ["REPO_NAME"]
          project_dir = Path(f"/tmp/projects/{repo_name}")
          # Read brief from the cloned project repo
          brief_path = project_dir / "BRIEF.md"
          brief = brief_path.read_text().strip() if brief_path.exists() else ""
          session = {
              "name": repo_name,
              "brief": brief,
              "project_dir": str(project_dir),
              "github_repo": f"baileymcintosh/{repo_name}",
              "github_url": f"https://github.com/baileymcintosh/{repo_name}",
              "phase": "prelim",
              "team": ["qual_builder", "quant_builder"],
              "completed_phases": ["prelim"],
              "last_run": datetime.datetime.now().isoformat(),
              "last_outputs": [],
              "pending_feedback": "",
              "notes": "",
              "publication_approval_required": False,
              "publication_approval_status": "",
              "publication_approval_run_id": "",
              "publication_approval_path": "",
              "publication_approval_updated_at": "",
          }
          Path("SESSION.json").write_text(json.dumps(session, indent=2))
          print(f"Session bootstrapped: {repo_name} (brief: {brief[:80]}...)")
          PYEOF

      - name: Run deep pipeline
        # Full canonical path: collaborative qual+quant session → critic checkpoint →
        # verifier → reporter → qa_editor → publication approval
        env:
          FEEDBACK: ${{ github.event.inputs.feedback }}
        run: |
          RUN_DIR="/tmp/projects/${REPO_NAME}/runs/deep_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$RUN_DIR"
          REPORTS_DIR="$RUN_DIR" uv run agentorg iterate "$FEEDBACK"

      - name: Summary
        if: always()
        run: echo "Results at https://github.com/baileymcintosh/${REPO_NAME}"
