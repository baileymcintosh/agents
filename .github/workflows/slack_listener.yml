name: Slack Command Listener

on:
  # Check for commands every 15 minutes
  schedule:
    - cron: "*/15 * * * *"
  # Also allow manual trigger
  workflow_dispatch:

env:
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_EXECUTIVE_CHANNEL_ID: ${{ secrets.SLACK_EXECUTIVE_CHANNEL_ID }}
  SLACK_BOT_USER_ID: ${{ secrets.SLACK_BOT_USER_ID }}
  GITHUB_REPO: ${{ github.repository }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  listen:
    name: "Listen for Slack commands"
    runs-on: ubuntu-latest
    permissions:
      actions: write   # needed to dispatch other workflows
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Process Slack commands
        run: uv run python -m agentorg.slack_bot.listener
