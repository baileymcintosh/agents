name: Run Single Agent

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent to run: planner | builder | verifier | reporter"
        required: true
        type: choice
        options: ["planner", "builder", "verifier", "reporter"]
      fast_mode:
        description: "Fast mode (Sonnet, short output)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      dry_run:
        description: "Dry run (no Claude calls)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      time_budget:
        description: "Time budget e.g. 5m, 30m, 2h, 20h (empty = unlimited)"
        required: false
        default: ""
        type: string

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_EXECUTIVE_CHANNEL_ID: ${{ secrets.SLACK_EXECUTIVE_CHANNEL_ID }}
  FAST_MODE: ${{ github.event.inputs.fast_mode }}
  TIME_BUDGET: ${{ github.event.inputs.time_budget || '' }}
  GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  run-agent:
    name: "Run ${{ github.event.inputs.agent }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Run agent
        run: |
          FLAG=$([[ "${{ github.event.inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          uv run agentorg run ${{ github.event.inputs.agent }} $FLAG
      - name: Push reports
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "agent: ${{ github.event.inputs.agent }} $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

  # ── Debugger: runs if the agent job above crashes completely ───────────────
  debug:
    name: "🔧 Debugger"
    needs: [run-agent]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Run Debugger
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run agentorg run debugger
      - name: Push debug report
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "debug: ${{ github.event.inputs.agent }} failure $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
