name: Preliminary Run

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project repo name (must exist at github.com/baileymcintosh/<name>)"
        required: true
        type: string
      brief:
        description: "Research brief"
        required: true
        type: string

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  AGENTORG_PROJECTS_ROOT: /tmp/projects
  AGENTORG_CREATE_GITHUB_REPO: "false"

jobs:
  prelim:
    name: "Prelim: ${{ github.event.inputs.project_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout agents repo
        uses: actions/checkout@v4
        with: { ref: main }

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync

      - name: Clone project repo
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
        run: |
          mkdir -p /tmp/projects
          git clone "https://x-access-token:${PAT_TOKEN}@github.com/baileymcintosh/${PROJECT_NAME}.git" /tmp/projects/${PROJECT_NAME}
          cd /tmp/projects/${PROJECT_NAME}
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/baileymcintosh/${PROJECT_NAME}.git"
          mkdir -p reports data notebooks

      - name: Write brief
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          BRIEF: ${{ github.event.inputs.brief }}
        run: echo "$BRIEF" > /tmp/projects/${PROJECT_NAME}/BRIEF.md

      - name: Bootstrap session state
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          BRIEF: ${{ github.event.inputs.brief }}
        run: |
          python3 - <<'PYEOF'
          import json, datetime, os
          from pathlib import Path
          project_name = os.environ["PROJECT_NAME"]
          brief = os.environ["BRIEF"]
          session = {
              "name": project_name,
              "brief": brief,
              "project_dir": f"/tmp/projects/{project_name}",
              "github_repo": f"baileymcintosh/{project_name}",
              "github_url": f"https://github.com/baileymcintosh/{project_name}",
              "phase": "planning",
              "team": ["qual_builder", "quant_builder"],
              "completed_phases": [],
              "last_run": datetime.datetime.now().isoformat(),
              "last_outputs": [],
              "pending_feedback": "",
              "notes": "",
              "publication_approval_required": False,
              "publication_approval_status": "",
              "publication_approval_run_id": "",
              "publication_approval_path": "",
              "publication_approval_updated_at": "",
          }
          Path("SESSION.json").write_text(json.dumps(session, indent=2))
          print(f"Session bootstrapped: {project_name}")
          PYEOF

      - name: Run prelim pipeline
        # Full canonical path: collaborative qual+quant session → critic → verifier → reporter → qa_editor
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_DIR="/tmp/projects/${PROJECT_NAME}/runs/prelim_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$RUN_DIR"
          REPORTS_DIR="$RUN_DIR" uv run agentorg prelim

      - name: Summary
        if: always()
        env:
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
        run: echo "Results at https://github.com/baileymcintosh/${PROJECT_NAME}"
