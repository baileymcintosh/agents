name: Preliminary Run

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project name (slug, no spaces)"
        required: true
        type: string
      brief:
        description: "Task brief"
        required: true
        type: string
      team:
        description: "Comma-separated agent roles e.g. qual_builder,quant_builder,reporter"
        required: true
        type: string

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Prelim model assignments — Groq (free) for qual/research, Sonnet for quant (needs tool use)
  QUAL_BUILDER_MODEL: "llama-3.3-70b-versatile"
  QUANT_BUILDER_MODEL: "claude-sonnet-4-6"
  REPORTER_MODEL: "claude-sonnet-4-6"
  TIME_BUDGET: "8m"

jobs:
  prelim:
    name: "Prelim: ${{ github.event.inputs.project_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout agents repo
        uses: actions/checkout@v4
        with: { ref: main }

      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync

      - name: Create or clone project repo
        run: |
          PROJECT="${{ github.event.inputs.project_name }}"
          REPO="baileymcintosh/${PROJECT}"

          # Create repo if it doesn't exist
          if ! gh repo view "$REPO" > /dev/null 2>&1; then
            gh repo create "$REPO" --public \
              --description "${{ github.event.inputs.brief }}" \
              --add-readme
            echo "created=true" >> $GITHUB_ENV
          fi

          # Clone it
          gh repo clone "$REPO" /tmp/project
          cd /tmp/project

          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"

          mkdir -p reports notebooks data
          echo "${{ github.event.inputs.brief }}" > BRIEF.md
          git add . && git diff --staged --quiet || git commit -m "init: project setup"
          git push

      - name: Run preliminary agents
        env:
          REPORTS_DIR: /tmp/project/reports
        run: |
          TEAM="${{ github.event.inputs.team }}"
          IFS=',' read -ra ROLES <<< "$TEAM"

          for role in "${ROLES[@]}"; do
            role=$(echo "$role" | tr -d ' ')
            if [ "$role" = "reporter" ]; then continue; fi
            echo "=== $role ==="
            uv run agentorg run "$role" --time-budget 8m || echo "$role error — continuing"
          done

          echo "=== reporter ==="
          uv run agentorg run reporter --time-budget 4m || echo "reporter error"

      - name: Push outputs to project repo
        run: |
          cd /tmp/project
          git add .
          git diff --staged --quiet || git commit -m "prelim: initial research outputs"
          git pull --rebase origin main
          git push
          echo "Project repo: https://github.com/baileymcintosh/${{ github.event.inputs.project_name }}"
