name: Verifier Agent

on:
  workflow_run:
    workflows: ["Builder Agent"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Claude calls)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  verify:
    name: QA Review of Build Outputs
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run Verifier Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ALERTS_CHANNEL_ID: ${{ secrets.SLACK_ALERTS_CHANNEL_ID }}
          AGENT_MODEL: ${{ vars.AGENT_MODEL || 'claude-opus-4-6' }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          uv run agentorg run verifier $DRY_RUN_FLAG

      - name: Commit and push reports
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: verifier report $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
