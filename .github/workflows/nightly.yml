name: Nightly Full Pipeline

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Claude calls or Slack posts)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# Shared env vars available to all jobs
env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_EXECUTIVE_CHANNEL_ID: ${{ secrets.SLACK_EXECUTIVE_CHANNEL_ID }}

jobs:
  # ── Step 1: Plan ───────────────────────────────────────────────────────────
  plan:
    name: "1 — Planner"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Run Planner
        run: |
          FLAG=$([[ "${{ github.event.inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          uv run agentorg run planner $FLAG
      - name: Push reports
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "nightly: planner $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

  # ── Step 2: Build ──────────────────────────────────────────────────────────
  build:
    name: "2 — Builder"
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Run Builder
        run: |
          FLAG=$([[ "${{ github.event.inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          uv run agentorg run builder $FLAG
      - name: Push reports
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "nightly: builder $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

  # ── Step 3: Verify ─────────────────────────────────────────────────────────
  verify:
    name: "3 — Verifier"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Run Verifier
        run: |
          FLAG=$([[ "${{ github.event.inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          uv run agentorg run verifier $FLAG
      - name: Push reports
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "nightly: verifier $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

  # ── Step 4: Report → Executive + Slack ────────────────────────────────────
  report:
    name: "4 — Executive Report + Slack"
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync
      - name: Install pandoc + LaTeX for PDF generation
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-dejavu
      - name: Run Reporter
        run: |
          FLAG=$([[ "${{ github.event.inputs.dry_run }}" == "true" ]] && echo "--dry-run" || echo "")
          uv run agentorg run reporter $FLAG
      - name: Push final reports
        run: |
          git config user.name "AgentOrg Bot"
          git config user.email "agentorg-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "nightly: executive summary $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
